name: Lint

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install -g web-ext

      - name: Lint (Chromium)
        run: web-ext lint --source-dir . --ignore-files .github --target chromium

      - name: Lint (Firefox)
        run: |
          mkdir /tmp/ff-lint
          cp -r . /tmp/ff-lint/
          jq -s '.[0] * .[1]' manifest.json manifest.firefox.patch.json > /tmp/ff-lint/manifest.json
          web-ext lint --source-dir /tmp/ff-lint --ignore-files .github --target firefox
