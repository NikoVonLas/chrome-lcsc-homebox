name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install -g web-ext

      - run: npm ci

      - name: Run tests with coverage
        run: npm test

      - name: Apply Firefox manifest patch
        run: jq -s '.[0] * .[1]' src/manifest.json manifest.firefox.patch.json > src/manifest.tmp.json && mv src/manifest.tmp.json src/manifest.json

      - name: Lint
        run: web-ext lint --source-dir src

  release:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      HAS_CHROME_SECRETS: ${{ secrets.CHROME_EXTENSION_ID != '' }}
      HAS_AMO_SECRETS: ${{ secrets.AMO_JWT_ISSUER != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install -g web-ext

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' src/manifest.json > src/manifest.tmp.json
          mv src/manifest.tmp.json src/manifest.json

      - name: Build Chrome ZIP
        run: cd src && zip -r ../extension-chrome.zip .

      - name: Publish to Chrome Web Store
        if: env.HAS_CHROME_SECRETS == 'true'
        uses: mnao305/chrome-extension-upload@fdfe79400af990f5145a319e834aee64907ccff4 # v6.0.0
        with:
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          file-path: extension-chrome.zip
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}

      - name: Apply Firefox manifest patch
        run: jq -s '.[0] * .[1]' src/manifest.json manifest.firefox.patch.json > src/manifest.tmp.json && mv src/manifest.tmp.json src/manifest.json

      - name: Sign & submit to AMO
        if: env.HAS_AMO_SECRETS == 'true'
        env:
          AMO_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: web-ext sign --source-dir src --channel listed --api-key "$AMO_KEY" --api-secret "$AMO_SECRET" --artifacts-dir ./web-ext-artifacts
        continue-on-error: true

      - name: Build Firefox ZIP
        run: cd src && zip -r ../extension-firefox.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            extension-chrome.zip
            extension-firefox.zip
          generate_release_notes: true
