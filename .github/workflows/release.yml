name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install -g web-ext

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' manifest.json > manifest.tmp.json
          mv manifest.tmp.json manifest.json

      - name: Build Chrome ZIP
        run: zip -r extension-chrome.zip . -x "*.git*" -x "*.github*" -x "manifest.firefox.patch.json"

      - name: Publish to Chrome Web Store
        if: ${{ secrets.CHROME_EXTENSION_ID != '' }}
        uses: fregante/chrome-webstore-upload-action@v2
        with:
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          file-name: extension-chrome.zip

      - name: Apply Firefox manifest patch
        run: jq -s '.[0] * .[1]' manifest.json manifest.firefox.patch.json > manifest.tmp.json && mv manifest.tmp.json manifest.json

      - name: Sign & submit to AMO
        if: ${{ secrets.AMO_JWT_ISSUER != '' }}
        env:
          AMO_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: web-ext sign --source-dir . --channel listed --api-key "$AMO_KEY" --api-secret "$AMO_SECRET" --artifacts-dir ./web-ext-artifacts
        continue-on-error: true

      - name: Build Firefox ZIP
        run: zip -r extension-firefox.zip . -x "*.git*" -x "*.github*" -x "manifest.firefox.patch.json"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            extension-chrome.zip
            extension-firefox.zip
          generate_release_notes: true
