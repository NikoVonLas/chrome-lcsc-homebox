name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install -g web-ext

      - name: Apply Firefox manifest patch
        run: jq -s '.[0] * .[1]' manifest.json manifest.firefox.patch.json > manifest.tmp.json && mv manifest.tmp.json manifest.json

      - name: Lint
        run: web-ext lint --source-dir . --ignore-files .github

      - name: SonarCloud Quality Gate
        uses: SonarSource/sonarcloud-github-action@ffc3010689be73b8e5ae0c57ce35968afd7909e8 # v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: -Dsonar.qualitygate.wait=true

  release:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install -g web-ext

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' manifest.json > manifest.tmp.json
          mv manifest.tmp.json manifest.json

      - name: Build Chrome ZIP
        run: zip -r extension-chrome.zip . -x "*.git*" -x "*.github*" -x "manifest.firefox.patch.json" -x "sonar-project.properties"

      - name: Publish to Chrome Web Store
        if: ${{ secrets.CHROME_EXTENSION_ID != '' }}
        uses: mnao305/chrome-extension-upload@fdfe79400af990f5145a319e834aee64907ccff4 # v6.0.0
        with:
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          file-path: extension-chrome.zip
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}

      - name: Apply Firefox manifest patch
        run: jq -s '.[0] * .[1]' manifest.json manifest.firefox.patch.json > manifest.tmp.json && mv manifest.tmp.json manifest.json

      - name: Sign & submit to AMO
        if: ${{ secrets.AMO_JWT_ISSUER != '' }}
        env:
          AMO_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: web-ext sign --source-dir . --channel listed --api-key "$AMO_KEY" --api-secret "$AMO_SECRET" --artifacts-dir ./web-ext-artifacts
        continue-on-error: true

      - name: Build Firefox ZIP
        run: zip -r extension-firefox.zip . -x "*.git*" -x "*.github*" -x "manifest.firefox.patch.json" -x "sonar-project.properties"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            extension-chrome.zip
            extension-firefox.zip
          generate_release_notes: true
